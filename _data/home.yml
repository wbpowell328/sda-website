# Homepage content blocks for the magazine layout.
# Edit any field and Jekyll will pick it up on next build.

intro:
  eyebrow: CASTLE Lab — Princeton ORFE
  body: >-
    <strong>CASTLE Lab</strong> specializes in the study of
    <strong>sequential decision problems</strong> &mdash; settings that
    blend the flow of information and decisions over time, where each
    choice must be made knowing that its impact is uncertain. Our work
    spans energy, transportation, health, finance, and the foundations
    of AI, unified by a single modeling framework that organizes them all.

videos:
  - title: Framing Decision Problems
    description: >-
      An introduction to the three elements of decision problems &mdash;
      metrics, decisions, and uncertainties.
    url: https://tinyurl.com/PowellFramingVideo/
  - title: How to Teach Optimization
    description: >-
      Highlights that the vast majority of decision problems (including
      linear programs) are sequential decision problems &mdash; which
      means we are looking to find the best policy.
    url: https://tinyurl.com/HowToTeachOptimization/
  - title: "Sequential Decision Problems: Energy applications"
    description: >-
      Illustrates the universal modeling framework using energy
      applications.
    url: https://tinyurl.com/PowellvideoSDAhealth/

