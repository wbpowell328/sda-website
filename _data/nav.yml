# Sidebar nav driven by the outline in
# https://docs.google.com/document/d/1UyK1X0Gbx_4Bcb7sGLu5qaCPPeCS6lr3S466vy6bZeg/
#
# Entry types the layout understands:
#   - title + url + (cta: true)          → top-level standalone CTA link
#   - title + url                        → top-level standalone link (plain)
#   - title + url + external: true       → opens in new tab
#   - section + items                    → collapsible group
#     each item is one of:
#       - title + url                    → clickable nav link (relative URL)
#       - title + url + external: true   → external link, opens in new tab
#       - title + placeholder: true      → grayed-out, non-clickable ("coming soon")
#       - subheader                      → small bold label inside an items list

