title: Sequential Decision Analytics
description: >-
  Warren B. Powell — Sequential Decision Analytics, Reinforcement Learning,
  Stochastic Optimization. Princeton ORFE.
author: Warren B. Powell

# URL settings for GitHub Pages preview at https://wbpowell328.github.io/sda-website/
url: "https://wbpowell328.github.io"
baseurl: "/sda-website"

# No parent theme — we ship our own layouts in _layouts/ and CSS in
# assets/css/main.css. Plugins below still work.

# Tell Jekyll to also process pages in the _pages/ folder
include:
  - _pages

# Give every page in _pages/ the "page" layout by default.
# Liquid is suppressed per-page by wrapping bodies in {% raw %}...{% endraw %}
# during the WordPress conversion (Jekyll 3.x on GitHub Pages doesn't support
# the front-matter render_with_liquid flag).
defaults:
  - scope:
      path: "_pages"
    values:
      layout: page

# Build settings
markdown: kramdown
kramdown:
  # Use kramdown's mathjax engine: wraps $$...$$ math in <script type="math/tex">
  # tags whose contents are NOT processed by Markdown (so | doesn't become a
  # table, _ doesn't become italic, \{ doesn't get eaten as an escape, etc.).
  # The default.html layout has a tiny MathJax-v3 shim that converts those
  # legacy script tags into \( \) / \[ \] delimiters before MathJax processes.
  math_engine: mathjax
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude these from the published site
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - README.md
  - "*.xml"
  - wp-content/
  - attachment_urls.txt
  - download_failures.txt
  - download_attachments.sh
  - page_inventory.md
  - drop_list.md
  - chatbot/
  - design-mockups/
  - "Website images/"
  - "Webpage notes.docx"
